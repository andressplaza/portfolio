<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0 user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css"
        integrity="sha512-KfkfwYDsLkIlwQp6LFnl8zNdLGxu9YAA1QvwINks4PhcElQSvqcyVLLD9aMhXd13uQjoXtEKNosOWaZqXgel0g=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="scss/main.css">
    <title>Portfolio | Andrés Plaza</title>
</head>

<body>
    <div class="star"></div>
    <div class="stars-and-meteors-container">
        <div class="meteor-1"></div>
        <div class="meteor-2"></div>
        <div class="meteor-3"></div>
        <div class="meteor-4"></div>
        <div class="meteor-5"></div>
    <div class="container">

        <!-- SECCION I N I C I O -->
        <header class="header">
            <nav>
                <div class="logo">
                    <a href="#"><img src="img/logo.png" alt="Logo"></a>
                </div>
                <div>
                    <ul>
                        <li><a class="shine" href="#contacto">Contacto</a></li>
                        <li><a class="shine" href="#sobremi">Sobre Mí</a></li>
                        <li><a class="shine" href="#servicios">Stack</a></li>
                    </ul>
                </div>
                <div class="dark-mode">
                    <a href="#"><i class="fa-solid fa-moon fa-2xl" style="color: #ffffff;"></i></a>
                </div>
            </nav>
        </header>
        <section class="inicio">
            <div class="inicio-contenido">
                <div class="inicio-sobremi">
                    <div class="card">
                        <img src="img/foto.png" alt="Foto" class="card-img">
                        <div class="card-description">
                            <p>Breve descripción sobre mí.</p>
                        </div>
                    </div>
                </div>
                <div class="inicio-descripcion">
                    <div class="card">
                        <div class="card-text">
                            <p>Texto descriptivo detallado sobre el tema o servicio.</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>
    <div class="meteor-6"></div>
        <div class="meteor-7"></div>
        <div class="meteor-8"></div>
        <div class="meteor-9"></div>
        <div class="meteor-10"></div>
</div>
    <script src="app.js" defer></script>
</body>

</html>
